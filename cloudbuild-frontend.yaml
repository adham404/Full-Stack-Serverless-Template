steps:
  - name: 'gcr.io/cloud-builders/npm'
    dir: 'frontend'
    args: ['ci']

  - name: 'gcr.io/cloud-builders/npm'
    dir: 'frontend'
    args: ['run', 'build']

  - name: 'node:18'
    entrypoint: bash
    args: 
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project $PROJECT_ID --token "$(gcloud auth print-access-token)"
    dir: 'frontend'

options:
  logging: CLOUD_LOGGING_ONLY
